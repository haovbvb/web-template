services:
  web:
    image: ${WEB_IMAGE:-ghcr.io/example/enterprise-web:latest}
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      target: prod
    restart: unless-stopped
    ports:
      - '5173:80'
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost']
      interval: 20s
      timeout: 5s
      retries: 10
    mem_limit: 256m
    cpus: 0.5
    depends_on:
      api:
        condition: service_healthy

  api:
    image: ${API_IMAGE:-ghcr.io/example/enterprise-api:latest}
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
      target: prod
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DB_PROVIDER=${DB_PROVIDER:-postgres}
      - POSTGRES_URL=${POSTGRES_URL:-postgresql://postgres:postgres@postgres:5432/app}
      - MONGO_URL=${MONGO_URL:-mongodb://mongo:27017/app}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - JWT_SECRET=${JWT_SECRET:-replace_me}
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000/metrics').then(()=>process.exit(0)).catch(()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 10
    mem_limit: 512m
    cpus: 1
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 10
    mem_limit: 256m
    cpus: 0.5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=app
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d app']
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 512m
    cpus: 1

  mongo:
    image: mongo:7
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 512m
    cpus: 1

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:9090/-/healthy']
      interval: 20s
      timeout: 5s
      retries: 10
    mem_limit: 256m
    cpus: 0.5
    depends_on:
      api:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    ports:
      - '3002:3000'
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ../monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards/json:ro
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000/api/health']
      interval: 20s
      timeout: 5s
      retries: 10
    mem_limit: 256m
    cpus: 0.5
    depends_on:
      prometheus:
        condition: service_healthy
