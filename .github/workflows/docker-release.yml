name: Docker Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: Custom image tag
        required: false
        default: ''

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
      owner_lower: ${{ steps.owner.outputs.value }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute image owner
        id: owner
        run: |
          echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.api
          target: prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/enterprise-api:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/enterprise-api:latest

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.web
          target: prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/enterprise-web:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/enterprise-web:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
    concurrency:
      group: prod-deploy
      cancel-in-progress: false
    steps:
      - name: Upload production compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT || '22' }}
          fingerprint: ${{ secrets.PROD_SSH_FINGERPRINT }}
          source: infra/docker/docker-compose.prod.yml
          target: ${{ secrets.PROD_DEPLOY_PATH }}
          strip_components: 2

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT || '22' }}
          fingerprint: ${{ secrets.PROD_SSH_FINGERPRINT }}
          script_stop: true
          script: |
            set -euo pipefail

            DEPLOY_PATH="${{ secrets.PROD_DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then
              echo "PROD_DEPLOY_PATH is empty"
              exit 1
            fi

            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            if [ ! -f "$DEPLOY_PATH/docker-compose.prod.yml" ]; then
              echo "docker-compose.prod.yml not found in $DEPLOY_PATH"
              exit 1
            fi

            if [ -n "${{ secrets.PROD_ENV_FILE }}" ]; then
              printf '%s' "${{ secrets.PROD_ENV_FILE }}" > .env
              chmod 600 .env
            fi

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            export REGISTRY_PREFIX="${{ env.REGISTRY }}/${{ needs.build-and-push.outputs.owner_lower }}"
            export API_IMAGE="${REGISTRY_PREFIX}/enterprise-api:${{ needs.build-and-push.outputs.image_tag }}"
            export WEB_IMAGE="${REGISTRY_PREFIX}/enterprise-web:${{ needs.build-and-push.outputs.image_tag }}"

            docker compose -f docker-compose.prod.yml pull web api
            docker compose -f docker-compose.prod.yml up -d web api

            docker image prune -f
