name: Docker Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: Custom image tag
        required: false
        default: ''

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.api
          target: prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/enterprise-api:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/enterprise-api:latest

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.web
          target: prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/enterprise-web:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/enterprise-web:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
    concurrency:
      group: prod-deploy
      cancel-in-progress: false
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail

            DEPLOY_PATH="${{ secrets.PROD_DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then
              echo "PROD_DEPLOY_PATH is empty"
              exit 1
            fi

            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            if [ ! -d .git ]; then
              echo "Repository not found in $DEPLOY_PATH. Please clone the project on server first."
              exit 1
            fi

            git fetch --all --prune
            git checkout main
            git pull --ff-only origin main

            if [ -n "${{ secrets.PROD_ENV_FILE }}" ]; then
              printf '%s' "${{ secrets.PROD_ENV_FILE }}" > .env
              chmod 600 .env
            fi

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            export REGISTRY_PREFIX="${{ env.REGISTRY }}/${{ github.repository_owner }}"
            bash infra/docker/deploy-test.sh "${{ needs.build-and-push.outputs.image_tag }}"

            docker image prune -f
